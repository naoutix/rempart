# Protection des identifiants en mémoire.
#
# Domaine à fort rendement : ces réglages n'empêchent pas l'intrusion, ils empêchent
# qu'une machine compromise en livre d'autres. C'est ce qui distingue un incident
# isolé d'une propagation latérale.

- id: WIN-CRED-001
  title: LSA Protection (RunAsPPL) désactivée
  severity: high
  domain: credentials
  rationale: >
    Sans RunAsPPL, un attaquant disposant de droits administrateur locaux peut lire la
    mémoire du processus LSASS et en extraire des identifiants en clair ou des hachages
    réutilisables. C'est l'étape qui transforme un poste compromis en accès au reste
    du parc.
  references: [CIS-2.3.10, ASD-E8]
  check:
    type: registry
    path: HKLM\SYSTEM\CurrentControlSet\Control\Lsa
    value: RunAsPPL
    operator: atLeast
    expect: "1"
    # 1 = activé avec verrou UEFI, 2 = activé sans. Les deux protègent LSASS ;
    # exiger exactement 1 rejetterait une machine correctement configurée.
    windowsDefault: "0"
  remediation:
    reversibility: trivial
    breaks: >
      Le chargement des pilotes de sécurité non signés par Microsoft. L'antivirus tiers
      concerné démarre alors sans sa protection noyau, ou pas du tout.
    affects: >
      Les machines équipées d'un antivirus tiers ancien. Sans antivirus tiers, ou avec
      une version récente correctement signée, aucun effet.
    verifyBefore: >
      Relever les pilotes non signés actuellement chargés, et confirmer auprès de
      l'éditeur que la version installée est compatible avec RunAsPPL.

- id: WIN-CRED-002
  title: WDigest conserve les mots de passe en clair en mémoire
  severity: critical
  domain: credentials
  rationale: >
    Activé, WDigest maintient le mot de passe en clair dans la mémoire de LSASS. Le
    réglage est désactivé par défaut depuis Windows 8.1, mais reste réactivable et
    survit aux mises à niveau — d'où l'intérêt de le vérifier explicitement.
  references: [CIS-18.9.28, ASD-E8]
  check:
    type: registry
    path: HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest
    value: UseLogonCredential
    operator: notEquals
    expect: "1"
    # Absent depuis Windows 8.1 : le mot de passe n'est plus conservé en clair.
    windowsDefault: "0"

- id: WIN-CRED-003
  title: Nombre de connexions mises en cache trop élevé
  severity: medium
  domain: credentials
  rationale: >
    Les identifiants de domaine mis en cache permettent de se connecter hors réseau,
    mais restent extractibles depuis la machine. Une valeur faible limite la fenêtre
    d'exposition sans gêner un usage nomade normal.
  references: [CIS-2.3.7.4]
  check:
    type: registry
    path: HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    value: CachedLogonsCount
    operator: equals
    expect: "4"
    windowsDefault: "10"
