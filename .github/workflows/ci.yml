name: CI

# Les actions tierces sont epinglees par empreinte de commit, pas par tag mouvant :
# un tag comme @v4 ou :latest peut etre reecrit en amont, ce qui reintroduirait du code
# non revu dans une chaine qui, pour un outil de securite, se doit d'etre reproductible.
# Le commentaire garde la version lisible ; Dependabot bump l'empreinte (.github/dependabot.yml).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  lint-workflows:
    # Un workflow invalide echoue au demarrage, sans job et sans log lisible.
    # Le valider ici evite de diagnostiquer a l'aveugle. Meme controle en local
    # via scripts/verify.ps1.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  test:
    # Les tests ne touchent que Rempart.Core et rejouent des instantanés :
    # ils n'ont besoin d'aucune machine Windows.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Tests unitaires et sur fixtures
        run: dotnet test tests/Rempart.Tests.Unit --configuration Release

  test-windows:
    # La couche Rempart.Windows -- P/Invoke, registre -- ne peut se tester que sur
    # Windows. Une signature P/Invoke fausse ne se voit pas a la compilation : elle
    # rend une valeur plausible et silencieusement erronee.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Tests contre le vrai registre et les API systeme
        run: dotnet test tests/Rempart.Tests.Windows --configuration Release

  publish-aot:
    # Vérifie le livrable réel : un binaire unique, sans runtime à installer.
    # Les runners Windows portent déjà le linker MSVC qu'exige Native AOT.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Publication Native AOT
        run: dotnet publish src/Rempart.Cli --configuration Release

      - name: Vérifier que le binaire tourne sans dépendance
        shell: pwsh
        run: |
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          if (-not (Test-Path $exe)) { throw "Binaire absent : $exe" }
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "rempart.exe = $size Mo"
          & $exe version
          if ($LASTEXITCODE -ne 0) { throw "rempart version a echoue" }

      - name: Scan réel sur le runner
        shell: pwsh
        run: |
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe scan
          # 0 = succes, 3 = droits insuffisants (acceptable sur un runner).
          if ($LASTEXITCODE -notin @(0, 3)) { throw "rempart scan a echoue ($LASTEXITCODE)" }

      - name: WMI repond depuis le binaire AOT
        shell: pwsh
        run: |
          # Les tests Windows s'executent en JIT, ou l'interop COM se comporte
          # differemment. Un bug d'interop a deja rendu WMI inoperant dans le binaire
          # publie sans que rien ne le signale : le scan sortait en 0 et tous les
          # controles WMI rendaient « non verifiable ».
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe diagnose-wmi
          if ($LASTEXITCODE -ne 0) { throw "WMI ne repond pas depuis le binaire AOT" }

      - name: Le planificateur repond depuis le binaire AOT
        shell: pwsh
        run: |
          # Meme risque que WMI, et pour la meme raison : l'interop COM du
          # planificateur est generee a la compilation et ses interfaces derivent
          # d'IDispatch. Un decalage d'un emplacement de table virtuelle ne se voit
          # ni a la compilation ni en JIT -- seulement ici. Un scan qui ne trouverait
          # aucune tache rendrait un rapport d'apparence saine.
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe diagnose-tasks
          if ($LASTEXITCODE -ne 0) { throw "Le planificateur ne repond pas depuis le binaire AOT" }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rempart-win-x64
          path: src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe

  fixtures-anonymised:
    # Garde-fou dédié : une capture brute versionnée par inadvertance exposerait
    # l'inventaire d'une machine réelle. Le test existe aussi dans la suite, mais
    # un job distinct rend l'échec lisible sans ouvrir les logs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Vérifier l'anonymisation des fixtures
        run: >
          dotnet test tests/Rempart.Tests.Unit --configuration Release
          --filter "FullyQualifiedName~Anonymised_fixtures_carry_no_machine_name"
