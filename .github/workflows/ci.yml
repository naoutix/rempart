name: CI

# Third-party actions are pinned by commit hash, not by movable tag: a tag such as
# @v4 or :latest can be rewritten upstream, which would reintroduce unreviewed code
# into a chain that, for a security tool, must stay reproducible.
# The comment keeps the version readable; Dependabot bumps the hash (.github/dependabot.yml).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  lint-workflows:
    # An invalid workflow fails at startup, with no job and no readable log.
    # Validating it here avoids diagnosing blind. Same check runs locally
    # via scripts/verify.ps1.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  test:
    # These tests only touch Rempart.Core and replay snapshots:
    # they need no Windows machine.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Unit and fixture-replay tests
        run: dotnet test tests/Rempart.Tests.Unit --configuration Release

  test-windows:
    # The Rempart.Windows layer -- P/Invoke, registry -- can only be tested on
    # Windows. A wrong P/Invoke signature is invisible at compile time: it returns
    # a plausible, silently wrong value.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Tests against the real registry and system APIs
        run: dotnet test tests/Rempart.Tests.Windows --configuration Release

  publish-aot:
    # Verifies the actual deliverable: a single binary, no runtime to install.
    # Windows runners already carry the MSVC linker that Native AOT requires.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Native AOT publish
        run: dotnet publish src/Rempart.Cli --configuration Release

      - name: Check the binary runs without dependencies
        shell: pwsh
        run: |
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          if (-not (Test-Path $exe)) { throw "Binary missing: $exe" }
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "rempart.exe = $size MB"
          & $exe version
          if ($LASTEXITCODE -ne 0) { throw "rempart version failed" }

      - name: Real scan on the runner
        shell: pwsh
        run: |
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe scan
          # 0 = success, 3 = insufficient rights (acceptable on a runner).
          if ($LASTEXITCODE -notin @(0, 3)) { throw "rempart scan failed ($LASTEXITCODE)" }

      - name: WMI responds from the AOT binary
        shell: pwsh
        run: |
          # The Windows tests run under JIT, where COM interop behaves differently.
          # An interop bug once left WMI dead in the published binary with nothing
          # reporting it: the scan exited 0 and every WMI check came back
          # « non verifiable ».
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe diagnose-wmi
          if ($LASTEXITCODE -ne 0) { throw "WMI does not respond from the AOT binary" }

      - name: Task Scheduler responds from the AOT binary
        shell: pwsh
        run: |
          # Same risk as WMI, and for the same reason: the Task Scheduler COM
          # interop is generated at compile time and its interfaces derive from
          # IDispatch. A one-slot vtable offset shows up neither at compile time
          # nor under JIT -- only here. A scan finding no tasks at all would
          # render a healthy-looking report.
          $exe = "src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe"
          & $exe diagnose-tasks
          if ($LASTEXITCODE -ne 0) { throw "Task Scheduler does not respond from the AOT binary" }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rempart-win-x64
          path: src/Rempart.Cli/bin/Release/net10.0-windows/win-x64/publish/rempart.exe

  fixtures-anonymised:
    # Dedicated guardrail: a raw capture committed by mistake would expose a real
    # machine's inventory. The test also exists in the suite, but a separate job
    # makes the failure readable without opening the logs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Check fixture anonymisation
        run: >
          dotnet test tests/Rempart.Tests.Unit --configuration Release
          --filter "FullyQualifiedName~Anonymised_fixtures_carry_no_machine_name"
