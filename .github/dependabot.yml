version: 2

# CI actions are pinned by commit hash (see .github/workflows/ci.yml).
# Without refreshes, a frozen pin misses upstream fixes, security ones included.
# Dependabot bumps the hash while keeping the version comment up to date.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
